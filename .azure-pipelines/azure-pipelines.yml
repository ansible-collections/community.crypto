trigger:
  batch: true
  branches:
    include:
      - main
      - stable-*

pr:
  autoCancel: true
  branches:
    include:
      - main
      - stable-*

schedules:
  - cron: 0 9 * * *
    displayName: Nightly
    always: true
    branches:
      include:
        - main
  - cron: 0 12 * * 0
    displayName: Weekly (old stable branches)
    always: true
    branches:
      include:
        - stable-*

variables:
  - name: checkoutPath
    value: ansible_collections/community/crypto
  - name: coverageBranches
    value: main
  - name: entryPoint
    value: tests/utils/shippable/shippable.sh
  - name: fetchDepth
    value: 0

resources:
  containers:
    - container: default
      image: quay.io/ansible/azure-pipelines-test-container:8.0.0

pool: Standard

stages:
  - stage: sanity
    displayName: Sanity
    dependsOn: []
    variables:
      entryPoint: tests/utils/shippable/nox.sh
    jobs:
      - template: templates/matrix.yml
        parameters:
          targets:
            - name: ansible-core 2.19
              test: ansible-test-sanity-2.19

  - stage: units
    displayName: Unit tests
    dependsOn: []
    variables:
      entryPoint: tests/utils/shippable/nox.sh
    jobs:
      - template: templates/matrix.yml
        parameters:
          targets:
            - name: ansible-core 2.19
              test: ansible-test-units-2.19

  - stage: docker_2_19
    displayName: Docker 2.19
    dependsOn: []
    variables:
      entryPoint: tests/utils/shippable/nox.sh
    jobs:
      - template: templates/matrix.yml
        parameters:
          targets:
            - name: Alpine 3.21 + group 1
              test: ansible-test-integration-2.19-alpine321-azp-posix-1
            - name: Alpine 3.21 + group 2
              test: ansible-test-integration-2.19-alpine321-azp-posix-2
            - name: Debian 12 + py3.11 + group 1
              test: ansible-test-integration-2.19-debian-bookworm-3.11-azp-posix-1
            - name: Debian 12 + py3.11 + group 2
              test: ansible-test-integration-2.19-debian-bookworm-3.11-azp-posix-2
            - name: Debian 11 + py3.9 + group 1
              test: ansible-test-integration-2.19-debian-bullseye-3.9-azp-posix-1
            - name: Debian 11 + py3.9 + group 2
              test: ansible-test-integration-2.19-debian-bullseye-3.9-azp-posix-2
            - name: Generic + py3.11 + group 1
              test: ansible-test-integration-2.19-default-3.11-azp-generic-1
            - name: Generic + py3.11 + group 2
              test: ansible-test-integration-2.19-default-3.11-azp-generic-2
            - name: Generic + py3.13 + group 1
              test: ansible-test-integration-2.19-default-3.13-azp-generic-1
            - name: Generic + py3.13 + group 2
              test: ansible-test-integration-2.19-default-3.13-azp-generic-2
            - name: Generic + py3.8 + group 1
              test: ansible-test-integration-2.19-default-3.8-azp-generic-1
            - name: Generic + py3.8 + group 2
              test: ansible-test-integration-2.19-default-3.8-azp-generic-2
            - name: Fedora 41 + group 1
              test: ansible-test-integration-2.19-fedora41-azp-posix-1
            - name: Fedora 41 + group 2
              test: ansible-test-integration-2.19-fedora41-azp-posix-2
            - name: Ubuntu 24.04 + group 1
              test: ansible-test-integration-2.19-ubuntu2404-azp-posix-1
            - name: Ubuntu 24.04 + group 2
              test: ansible-test-integration-2.19-ubuntu2404-azp-posix-2

  - stage: remote_2_19
    displayName: Remote 2.19
    dependsOn: []
    variables:
      entryPoint: tests/utils/shippable/nox.sh
    jobs:
      - template: templates/matrix.yml
        parameters:
          targets:
            - name: Alpine 3.21 + extra VMs
              test: ansible-test-integration-2.19-alpine-3.21-azp-posix-vm
            - name: Fedora 41 + extra VMs
              test: ansible-test-integration-2.19-fedora-41-azp-posix-vm
            - name: FreeBSD 13.5 + group 1
              test: ansible-test-integration-2.19-freebsd-13.5-azp-posix-1
            - name: FreeBSD 13.5 + group 2
              test: ansible-test-integration-2.19-freebsd-13.5-azp-posix-2
            - name: RHEL 10.1 + group 1
              test: ansible-test-integration-2.19-rhel-10.1-azp-posix-1
            - name: RHEL 10.1 + group 2
              test: ansible-test-integration-2.19-rhel-10.1-azp-posix-2
            - name: RHEL 9.7 + group 1
              test: ansible-test-integration-2.19-rhel-9.7-azp-posix-1
            - name: RHEL 9.7 + group 2
              test: ansible-test-integration-2.19-rhel-9.7-azp-posix-2
            - name: Ubuntu 22.04 + extra VMs
              test: ansible-test-integration-2.19-ubuntu-22.04-azp-posix-vm
            - name: Ubuntu 24.04 + extra VMs
              test: ansible-test-integration-2.19-ubuntu-24.04-azp-posix-vm

  - stage: Summary
    condition: succeededOrFailed()
    dependsOn:
      - sanity
      - units
      - docker_2_19
      - remote_2_19
    jobs:
      - template: templates/coverage.yml
